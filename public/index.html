<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PartyPix — Add your photos</title>
<meta name="theme-color" content="#EC4899" />
<meta name="description" content="Scan, snap, share — add your photos to the party's live album." />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="PartyPix" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 700px at 50% -10%, #f4eeff 0%, transparent 60%),
      radial-gradient(900px 600px at 100% 100%, #ffeef4 0%, transparent 55%),
      #eceaf2;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Real mobile web app: full-bleed on phones, a centered phone-width card on desktop. */
  .phone-shell {
    position: relative;
    width: 100%;
    max-width: 440px;
    height: 100dvh;
    background: #FFFDFB;
    overflow: hidden;
  }
  @media (min-width: 540px) {
    #root { padding: 24px 16px; }
    .phone-shell {
      height: min(880px, calc(100dvh - 48px));
      border-radius: 38px;
      box-shadow: 0 30px 80px rgba(42,33,64,0.22), 0 0 0 1px rgba(0,0,0,0.04);
    }
  }
  .app-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .app-scroll::-webkit-scrollbar { display: none; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, textarea { font-family: inherit; }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.6); }
    60%  { opacity: 1; transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(12px) scale(0.99); }
    to   { opacity: 1; transform: none; }
  }
  /* base = visible; the animation only plays the entrance. If paused, content shows. */
  .screen-in { animation: screenIn 0.42s cubic-bezier(0.22,1,0.36,1); }
  @media (prefers-reduced-motion: reduce) { .screen-in { animation: none; } }
  @keyframes stampIn {
    0%   { opacity: 0; transform: scale(0.2) rotate(-18deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-spinner {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff;
    display: inline-block; animation: spin 0.7s linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(-26px) rotate(22deg); opacity: 0.4; }
  }
  @keyframes fall {
    0%   { transform: translate(0,-10px) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx,0), 760px) rotate(var(--dr,540deg)); opacity: 1; }
  }
  @keyframes pulseRing {
    0%   { transform: scale(0.9); opacity: 0.55; }
    70%  { transform: scale(1.45); opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-7px); }
  }
  @keyframes shimmer {
    0% { background-position: -180px 0; }
    100% { background-position: 220px 0; }
  }
  .ph-shimmer {
    background: linear-gradient(100deg, rgba(255,255,255,0) 20%, rgba(255,255,255,0.45) 50%, rgba(255,255,255,0) 80%);
    background-size: 220px 100%;
    animation: shimmer 2.4s linear infinite;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- data layer (plain JS, must load before the app) -->
  <script src="app/api.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
