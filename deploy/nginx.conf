# nginx reverse proxy for PartyPix on a Droplet.
# 1) Put this at /etc/nginx/sites-available/partypix
# 2) ln -s /etc/nginx/sites-available/partypix /etc/nginx/sites-enabled/
# 3) Edit server_name, then: nginx -t && systemctl reload nginx
# 4) HTTPS:  certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;

    # Allow large photo uploads (matches MAX_FILE_BYTES * batch).
    client_max_body_size 320M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Long cache for processed images (served by the app at /uploads).
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
